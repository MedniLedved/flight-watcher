name: Test FlightLabs

# Izolovaný diagnostický běh FlightLabs po migraci na nový endpoint.
# Spouští se POUZE ručně (workflow_dispatch). Nezapisuje historii, neposílá
# Telegram, necommituje data – jen vypíše výsledky/chyby do logu.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-flightlabs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Probe FlightLabs měna (currency+market+countryCode → EUR?, ~6 req)
        env:
          FLIGHTLABS_KEY: ${{ secrets.FLIGHTLABS_KEY }}
        run: python -m scripts.probe_flightlabs_currency

      - name: Probe FlightLabs (Flight Prices async kontrakt, ~6 req, 1 trasa)
        if: ${{ false }}
        env:
          FLIGHTLABS_KEY: ${{ secrets.FLIGHTLABS_KEY }}
        run: python -m scripts.probe_flightlabs_correct

      - name: Run FlightLabs diagnostic (STARÝ rozbitý kontrakt – pálí kvótu, vypnuto)
        if: ${{ false }}
        env:
          FLIGHTLABS_KEY: ${{ secrets.FLIGHTLABS_KEY }}
        run: python -m scripts.test_flightlabs

      - name: Probe FlightLabs endpoints (jen při potřebě ladit kontrakt)
        if: ${{ false }}
        env:
          FLIGHTLABS_KEY: ${{ secrets.FLIGHTLABS_KEY }}
        run: python -m scripts.probe_flightlabs
