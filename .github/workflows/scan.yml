name: Japan Flight Scan

on:
  schedule:
    - cron: '0 7 * * *'   # Každý den v 7:00 UTC (8:00/9:00 CET/CEST)
  workflow_dispatch:        # Možnost spustit manuálně z GitHub UI

permissions:
  contents: write   # commit exportovaných JSONů pro dashboard

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Restore price history
        uses: actions/cache@v5
        with:
          path: |
            data/price_history.json
            data/skyscrapper_airports.json
          key: price-history-${{ github.run_id }}
          restore-keys: price-history-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Open-jaw (multi-city) na Google Flights vyžaduje JS render – zapíná se
      # repo variable GOOGLEFLIGHTS_FETCH_MODE=local; pak je potřeba playwright.
      - name: Install playwright (jen pro GOOGLEFLIGHTS_FETCH_MODE=local)
        if: vars.GOOGLEFLIGHTS_FETCH_MODE == 'local'
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run scanner
        env:
          GOOGLEFLIGHTS_FETCH_MODE: ${{ vars.GOOGLEFLIGHTS_FETCH_MODE }}
          DUFFEL_TOKEN: ${{ secrets.DUFFEL_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
          AMADEUS_CLIENT_SECRET: ${{ secrets.AMADEUS_CLIENT_SECRET }}
          AMADEUS_ENV: ${{ vars.AMADEUS_ENV }}
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MILESANDMORE_API_URL: ${{ vars.MILESANDMORE_API_URL }}
          MILESANDMORE_IGNORE_ROBOTS: ${{ vars.MILESANDMORE_IGNORE_ROBOTS }}
          MILESANDMORE_HEADERS: ${{ secrets.MILESANDMORE_HEADERS }}
        run: python -m src.scanner

      - name: Save price history
        if: always()
        uses: actions/cache@v5
        with:
          path: |
            data/price_history.json
            data/skyscrapper_airports.json
          key: price-history-${{ github.run_id }}

      # Exportované JSONy pro dashboard se commitují do repa – jsou to
      # kanonická data (append-only řady přežívají 90denní retenci scanneru).
      - name: Commit dashboard data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/history data/calendar 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Žádné změny v exportu – nic necommituji."
          else
            git commit -m "data: denní export pro dashboard"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
          fi
